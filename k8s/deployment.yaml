# k8s/deployment.yaml
# https://github.com/SubhanshuMG/oncall-burnout-fix

apiVersion: apps/v1
kind: Deployment
metadata:
  name: diagnosis-engine
  namespace: monitoring
  labels:
    app: diagnosis-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: diagnosis-engine
  template:
    metadata:
      labels:
        app: diagnosis-engine
    spec:
      serviceAccountName: diagnosis-engine
      containers:
        - name: diagnosis-engine
          image: your-registry/diagnosis-engine:latest
          ports:
            - containerPort: 8080
          env:
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: oncall-secrets
                  key: slack-webhook-url
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: oncall-secrets
                  key: openai-api-key
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: diagnosis-engine
  namespace: monitoring
spec:
  selector:
    app: diagnosis-engine
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: diagnosis-engine
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: diagnosis-engine
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: diagnosis-engine
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: diagnosis-engine
subjects:
  - kind: ServiceAccount
    name: diagnosis-engine
    namespace: monitoring
